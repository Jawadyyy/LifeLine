plugins {
    id "com.android.application"
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Load release signing config from key.properties (not committed).
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}
def hasReleaseSigning = keystorePropertiesFile.exists()

android {
    namespace = "com.lifeline.app"
    compileSdk = 35
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
            storeFile file('../debug-new.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (hasReleaseSigning) {
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    defaultConfig {
        // Play Store identity. com.lifeline.app was already taken on Play by
        // another developer; the namespace below stays unchanged (internal
        // code identifier only, not visible to Play).
        applicationId = "com.jdev.lifeline"
        minSdk = 23
        targetSdk = 35
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true

        // x86/x86_64 are emulator-only — no real Android phone ships on them.
        // Bundling them (plus Agora's full native SDK) is most of why the
        // universal APK balloons past 300MB; real installs only ever need
        // arm64-v8a (modern devices) or armeabi-v7a (older 32-bit devices).
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    buildTypes {
        debug {
            signingConfig = signingConfigs.debug
        }
        release {
            // Use the real upload key when key.properties is present; otherwise
            // fall back to debug signing so the project still configures/builds.
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        jniLibs {
            // agora_rtc_engine bundles the full RTC SDK including video/AR/beauty
            // extensions (face capture, segmentation, lip sync, spatial audio,
            // clear vision, audio beauty, AV1 video codec). LifeLine only does
            // voice calls — none of these are ever loaded, so exclude them
            // (~28MB/arch) rather than ship dead weight. Core call audio (the
            // main libagora-rtc-sdk.so) is untouched.
            excludes += [
                "**/libagora_face_capture_extension.so",
                "**/libagora_segmentation_extension.so",
                "**/libagora_lip_sync_extension.so",
                "**/libagora_spatial_audio_extension.so",
                "**/libagora_clear_vision_extension.so",
                "**/libagora_audio_beauty_extension.so",
                "**/libagora_video_av1_encoder_extension.so",
                "**/libagora_video_av1_decoder_extension.so",
                "**/libvideo_enc.so",
                "**/libvideo_dec.so",
            ]
        }
    }
}

flutter {
    source = "../.."
}

// agora_rtc_engine pulls in the screen-sharing module, which declares a
// media-projection foreground service + activity. LifeLine only does voice
// calls (no screen sharing), and that service makes Play require a
// media-projection foreground-service declaration for a feature the app never
// uses. Exclude the module so the service/activity/permission are gone.
configurations.all {
    exclude group: 'io.agora.rtc', module: 'full-screen-sharing'
}

dependencies {
    implementation(platform("com.google.firebase:firebase-bom:34.8.0"))
    implementation("com.google.firebase:firebase-analytics")
    implementation("com.google.firebase:firebase-crashlytics")
    implementation 'androidx.multidex:multidex:2.0.1'
}
